services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - reports:/app/reports
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - reports:/app/reports
