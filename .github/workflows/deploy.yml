name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never abort a running deploy

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build and push images to GitHub Container Registry ----
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghostcfo-api:latest
            ghcr.io/${{ github.repository_owner }}/ghostcfo-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghostcfo-web:latest
            ghcr.io/${{ github.repository_owner }}/ghostcfo-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- SSH into VPS and pull + restart ----
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ghostcfo

            # Pull the new images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull api web

            # Rolling restart — zero-downtime for the API
            docker compose up -d --no-deps --remove-orphans api worker beat web

            # Run any pending DB migrations
            docker compose exec -T api alembic upgrade head

            # Remove old images to save disk space
            docker image prune -f

            echo "Deploy complete — $(date)"
