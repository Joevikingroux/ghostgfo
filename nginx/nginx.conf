# Ghost CFO — Nginx reverse proxy config for the Hetzner VPS
# Sits in front of the Docker stack; handles SSL, rate limiting, gzip.
#
# Install path: /etc/nginx/sites-available/ghostcfo
# Enable:       ln -s /etc/nginx/sites-available/ghostcfo /etc/nginx/sites-enabled/ghostcfo
# SSL certs:    certbot --nginx -d ghostcfo.numbers10.co.za

# --- Rate limit zones (defined in http block or include from nginx.conf) ---
# Add these two lines to /etc/nginx/nginx.conf inside the http {} block:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name ghostcfo.numbers10.co.za;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ghostcfo.numbers10.co.za;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/ghostcfo.numbers10.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostcfo.numbers10.co.za/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # --- Upload size (for file uploads to the portal) ---
    client_max_body_size 25M;

    # --- Stricter rate limit on login + 2FA verify endpoints ---
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://127.0.0.1:8009/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/auth/2fa/verify {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://127.0.0.1:8009/auth/2fa/verify;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- API proxy ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8009/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Webhook (WhatsApp Meta hub) — no rate limit, Meta can be bursty ---
    location /api/webhooks/ {
        proxy_pass         http://127.0.0.1:8009/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- PayFast payment routes (browser redirects + ITN webhook from PayFast servers) ---
    location /payments/ {
        proxy_pass         http://127.0.0.1:8009/payments/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- SPA frontend (served from the web Docker container on port 3000) ---
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;

        # Cache static assets aggressively; SPA HTML must not be cached
        location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
            proxy_pass http://127.0.0.1:3001;
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
